name: Deploy to ringler-online.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ionos-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy per SFTP nach ringler-online.com
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.IONOS_FTP_SERVER }}
          port: 22
          username: ${{ secrets.IONOS_FTP_USERNAME }}
          password: ${{ secrets.IONOS_FTP_PASSWORD }}
          local_path: './dist/*'
          remote_path: ${{ secrets.IONOS_FTP_TARGET_DIR || '/leadscout/' }}
          sftpArgs: '-o ConnectTimeout=5'
